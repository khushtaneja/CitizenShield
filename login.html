<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — CitizenShield</title>
  <meta name="description" content="Authorized personnel login to the CitizenShield admin dashboard." />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>
</head>
<body>

  <!-- ── Toast Container ── -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ── Login Page ── -->
  <div class="login-page" id="home">
    <div class="login-card">

      <!-- Top decorative header -->
      <div class="login-card-top">
        <div class="lock-icon"><i class="ph ph-lock"></i></div>
        <h2>Admin Portal Login</h2>
        <p>Restricted access — authorized personnel only</p>
      </div>

      <!-- Login form body -->
      <div class="login-body">

        <!-- Hint box -->
        <div class="login-hint">
          <i class="ph ph-info" style="color:var(--primary);font-size:1rem;flex-shrink:0;"></i>
          Demo credentials: <strong style="margin-left:4px;">admin</strong> / <strong style="margin-left:4px;">admin123</strong>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="username">
              <i class="ph ph-user" style="color:var(--accent);margin-right:4px;"></i>
              Username <span class="req">*</span>
            </label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
              placeholder="Enter username"
              autocomplete="username"
            />
            <div class="input-error" id="err-username">Please enter your username.</div>
          </div>

          <div class="form-group">
            <label for="password">
              <i class="ph ph-lock" style="color:var(--accent);margin-right:4px;"></i>
              Password <span class="req">*</span>
            </label>
            <div style="position:relative;">
              <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="Enter password"
                autocomplete="current-password"
                style="padding-right:44px;"
              />
              <button type="button" id="togglePwd" style="position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-light);font-size:1.1rem;padding:0;">
                <i class="ph ph-eye" id="pwdEyeIcon"></i>
              </button>
            </div>
            <div class="input-error" id="err-password">Please enter your password.</div>
          </div>

          <div class="input-error" id="err-credentials" style="display:none;margin-top:-10px;margin-bottom:14px;font-size:0.88rem;">
            ⚠️ Incorrect username or password. Please try again.
          </div>

          <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%;justify-content:center;margin-top:4px;">
            <i class="ph ph-sign-in"></i> Sign In to Dashboard
          </button>
        </form>

        <div style="text-align:center;margin-top:20px;font-size:0.82rem;color:var(--text-light);">
          <a href="index.html" style="color:var(--primary);font-weight:500;">← Return to Citizen Portal</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase config (gitignored — contains credentials) -->
  <script src="firebase-config.js"></script>
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
